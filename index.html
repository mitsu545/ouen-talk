<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>応援トーク</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif; overscroll-behavior: none; }
  .chat-bg { background-color: #7da4cd; }
  .bubble-ai { background: #ffffff; border-radius: 16px 16px 16px 4px; }
  .bubble-user { background: #8de055; border-radius: 16px 16px 4px 16px; }
  .screen { display: none; }
  .screen.active { display: flex; }
  .typing-dot { animation: blink 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,60%,100% { opacity: .25; } 30% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .typing-dot { animation: none; } }
</style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">

<!-- ホーム画面：トークルーム一覧 -->
<div id="screen-home" class="screen active flex-col h-full max-w-md mx-auto bg-white">
  <header class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
    <h1 class="text-lg font-bold">トーク</h1>
    <button id="btn-settings" class="text-2xl" aria-label="設定">⚙️</button>
  </header>
  <div id="room-list" class="flex-1 overflow-y-auto"></div>
</div>

<!-- トーク画面 -->
<div id="screen-chat" class="screen flex-col h-full max-w-md mx-auto chat-bg">
  <header class="flex items-center gap-3 px-3 py-3 bg-white/95 border-b border-gray-200">
    <button id="btn-back" class="text-2xl px-1" aria-label="戻る">‹</button>
    <span id="chat-title" class="font-bold"></span>
  </header>
  <div id="messages" class="flex-1 overflow-y-auto px-3 py-4 space-y-3"></div>
  <!-- ③ ワンタップ応援チップ -->
  <div id="chips" class="flex gap-2 px-3 py-2 overflow-x-auto bg-white/80">
    <button class="chip shrink-0 px-3 py-1.5 rounded-full bg-white border border-gray-300 text-sm" data-msg="今日はちょっと疲れた…">疲れた😮‍💨</button>
    <button class="chip shrink-0 px-3 py-1.5 rounded-full bg-white border border-gray-300 text-sm" data-msg="今日も一日がんばったよ。褒めて！">褒めて🙏</button>
    <button class="chip shrink-0 px-3 py-1.5 rounded-full bg-white border border-gray-300 text-sm" data-msg="やる気が出ない…喝を入れてほしい！">喝入れて🔥</button>
  </div>
  <div class="flex items-end gap-2 p-2 bg-white">
    <textarea id="input" rows="1" placeholder="メッセージを入力"
      class="flex-1 resize-none rounded-2xl border border-gray-300 px-4 py-2 text-base focus:outline-none focus:border-green-500"></textarea>
    <button id="btn-send" class="shrink-0 w-10 h-10 rounded-full bg-[#06c755] text-white text-lg" aria-label="送信">↑</button>
  </div>
</div>

<!-- 設定画面 -->
<div id="screen-settings" class="screen flex-col h-full max-w-md mx-auto bg-gray-100">
  <header class="flex items-center gap-3 px-3 py-3 bg-white border-b border-gray-200">
    <button id="btn-settings-back" class="text-2xl px-1" aria-label="戻る">‹</button>
    <span class="font-bold">設定</span>
  </header>
  <div class="flex-1 overflow-y-auto p-4 space-y-6">
    <section class="bg-white rounded-xl p-4 space-y-3">
      <h2 class="font-bold text-sm text-gray-500">API設定</h2>
      <label class="block text-sm">Gemini APIキー
        <input id="set-apikey" type="password" class="mt-1 w-full border rounded-lg px-3 py-2" placeholder="AIza...">
      </label>
      <label class="block text-sm">モデル名
        <input id="set-model" type="text" class="mt-1 w-full border rounded-lg px-3 py-2" placeholder="gemini-2.5-flash">
      </label>
    </section>
    <div id="char-settings" class="space-y-6"></div>
    <button id="btn-save" class="w-full py-3 rounded-xl bg-[#06c755] text-white font-bold">保存する</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
